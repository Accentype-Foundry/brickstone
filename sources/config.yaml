# ==========================================
# 1. SOURCES AND BASIC INFO
# ==========================================
sources:
  - Brickstone.glyphs
familyName: "Brickstone"

# ==========================================
# 2. OUTPUT DIRECTORIES (Default GF structure)
# ==========================================
outputDir: ../fonts
vfDir: $outputDir/variable
ttDir: $outputDir/ttf
otDir: $outputDir/otf
woffDir: $outputDir/webfonts

# ==========================================
# 3. BUILD TARGETS
# ==========================================
buildVariable: true
buildStatic: true
buildTTF: true
buildOTF: false
buildSmallCap: false

# ==========================================
# 4. AUTOHINTING (Screen Optimization)
# ==========================================
autohintTTF: true   
autohintOTF: false
ttfaUseScript: false

# ==========================================
# 5. AUTOMATED FIXES (Google Fonts Fixes)
# ==========================================
includeSourceFixes: true

# ==========================================
# 6. FONTMAKE OUTLINE AND COMPONENT SETTINGS
# ==========================================
flattenComponents: true
decomposeTransformedComponents: true
checkCompatibility: true
# overlaps: booleanOperations
expandFeaturesToInstances: false
reverseOutlineDirection: true
removeOutlineOverlaps: true
extraFontmakeArgs: "--filter 'DottedCircleFilter(pre=True)'"

# ==========================================
# 7. STAT TABLE DEFINITION
# ==========================================
stat:
  "Brickstone[wght].ttf":
    - name: Weight
      tag: wght
      values:
        - name: Thin
          value: 100
        - name: ExtraLight
          value: 200
        - name: Light
          value: 300
        - name: Regular
          value: 400
          linkedValue: 700
          flags: 2
        - name: Medium
          value: 500
        - name: SemiBold
          value: 600
        - name: Bold
          value: 700
        - name: ExtraBold
          value: 800